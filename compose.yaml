services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-akashic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-akashic}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akashic}"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme-meili-key}
    volumes:
      - msdata:/meili_data
    ports:
      - "127.0.0.1:7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  tika:
    image: apache/tika:3.0.0.0
    ports:
      - "127.0.0.1:9998:9998"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    develop:
      watch:
        - action: rebuild
          path: ./api/akashic
        - action: rebuild
          path: ./api/pyproject.toml

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    develop:
      watch:
        - action: rebuild
          path: ./web/src
        - action: rebuild
          path: ./web/package.json
        - action: rebuild
          path: ./web/tailwind.config.js
        - action: rebuild
          path: ./web/index.html
        - action: rebuild
          path: ./web/nginx.conf

  # Phase 2 multi-scanner — the api stopped spawning the bundled
  # binary in routers/scans.py, so a scanner agent has to run
  # somewhere for /api/scans/trigger to actually do work. Mint a
  # `default`-pool scanner via Settings → Scanners (or `make
  # bootstrap-scanner`), drop the issued private key into
  # secrets/default-scanner/scanner.key, set SCANNER_ID in your
  # .env, then `docker compose up -d scanner` brings this up.
  scanner:
    build:
      context: .
      dockerfile: scanner/Dockerfile
    command:
      - agent
      - --api=http://api:8000
      - --scanner-id=${SCANNER_ID:-}
      - --key=/secrets/scanner.key
    volumes:
      - ./secrets/default-scanner:/secrets:ro
    depends_on:
      api:
        condition: service_started
    # Don't auto-start — the secret has to exist first. `docker
    # compose up scanner` brings it up explicitly.
    profiles: ["scanner"]

volumes:
  pgdata:
  msdata:
  redisdata:
