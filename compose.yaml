services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-akashic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-akashic}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akashic}"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme-meili-key}
    volumes:
      - msdata:/meili_data
    ports:
      - "127.0.0.1:7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  tika:
    image: apache/tika:3.0.0.0
    ports:
      - "127.0.0.1:9998:9998"

  api:
    build:
      context: .
      dockerfile: api/Dockerfile
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy
    # Liveness — flips green the moment uvicorn is accepting
    # connections. Used by `scanner.depends_on` so the agent doesn't
    # race the api during cold starts (would otherwise hit "connection
    # refused" on the first /api/scanners/discover call).
    healthcheck:
      test: ["CMD", "python3", "-c",
             "import urllib.request,sys; sys.exit(0 if urllib.request.urlopen('http://localhost:8000/health',timeout=2).status==200 else 1)"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s
    develop:
      watch:
        - action: rebuild
          path: ./api/akashic
        - action: rebuild
          path: ./api/pyproject.toml

  web:
    build:
      context: ./web
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    depends_on:
      - api
    develop:
      watch:
        - action: rebuild
          path: ./web/src
        - action: rebuild
          path: ./web/package.json
        - action: rebuild
          path: ./web/tailwind.config.js
        - action: rebuild
          path: ./web/index.html
        - action: rebuild
          path: ./web/nginx.conf

  # Bundled scanner agent. v0.3.0+ uses the `auto` entrypoint so
  # the same compose service works on every install state:
  #
  #   - First run, want operator-approved discovery:
  #       AKASHIC_DISCOVER=1 docker compose --profile scanner up scanner
  #     → stderr shows a pairing code; approve in Settings → Scanners.
  #
  #   - First run, have a join token (from Settings → Scanners):
  #       AKASHIC_CLAIM_TOKEN=akcl_… docker compose --profile scanner up scanner
  #
  #   - Subsequent runs (credentials persisted in the named volume):
  #       docker compose --profile scanner up scanner
  #     → auto detects the saved key+id and runs `agent` directly.
  #
  # Uses a *named* docker volume rather than a host bind mount so
  # the container (which runs as uid 1000) can write the generated
  # key on first run without host-side chown ceremony.
  #
  # Migrating from a pre-v0.3.0 install with files in
  # ./secrets/default-scanner/?  Two options:
  #   1. (preferred) discover/claim a fresh scanner — the new flow
  #      generates the keypair on the scanner host, which is a
  #      strict security improvement.
  #   2. Copy the existing key into the named volume:
  #        docker run --rm -v akashic_scanner-data:/dst -v $(pwd)/secrets/default-scanner:/src:ro \
  #          alpine cp /src/scanner.key /dst/scanner.key
  #      …and set SCANNER_ID env from your old .env.
  scanner:
    build:
      context: .
      dockerfile: scanner/Dockerfile
    command: [auto]
    environment:
      AKASHIC_API_URL: http://api:8000
      AKASHIC_DISCOVER: ${AKASHIC_DISCOVER:-}
      AKASHIC_CLAIM_TOKEN: ${AKASHIC_CLAIM_TOKEN:-}
      SCANNER_ID: ${SCANNER_ID:-}
    volumes:
      - scanner-data:/secrets
    depends_on:
      api:
        # Wait for the api's /health probe to flip green, not just for
        # the container to be created. Without this, the scanner POSTs
        # to /api/scanners/discover before uvicorn is bound and hits a
        # connection-refused on first try.
        condition: service_healthy
    profiles: ["scanner"]

  # Optional Prometheus scraper for the akashic_* metrics that the
  # api exposes at /metrics (v0.4.3). Profile-gated so users
  # without a metrics interest don't spin up another container by
  # default. Enable with:
  #   docker compose --profile metrics up -d prometheus
  # Then open http://localhost:9090.
  prometheus:
    image: prom/prometheus:v2.55.0
    volumes:
      - ./ops/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheusdata:/prometheus
    ports:
      - "127.0.0.1:9090:9090"
    profiles: ["metrics"]
    depends_on:
      - api

volumes:
  pgdata:
  msdata:
  redisdata:
  scanner-data:
  prometheusdata:
