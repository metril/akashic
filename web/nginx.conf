# `map` and `log_format` must live at http{} scope, not inside server{}.
# WS access tokens travel as `?token=<jwt>` because browsers can't set
# the Authorization header on the upgrade handshake. Scrub the token
# from access logs so the bearer credential never reaches log storage.
# The token is still in `Referer` of any cross-origin subresource — the
# strict-origin-when-cross-origin policy on the server block suppresses
# that.
map $request_uri $request_uri_scrubbed {
    ~^(?<base>/ws/[^?]*)\?.*token=  $base?token=REDACTED;
    default                          $request_uri;
}
log_format ws_safe '$remote_addr - $remote_user [$time_local] '
                   '"$request_method $request_uri_scrubbed $server_protocol" '
                   '$status $body_bytes_sent "$http_referer" "$http_user_agent"';

server {
    listen 3000;
    root /usr/share/nginx/html;
    index index.html;
    access_log /var/log/nginx/access.log ws_safe;

    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self' data:; object-src 'none';" always;

    location /api/ {
        proxy_pass http://api:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
    }

    # WebSocket fan-out for live scan progress (Phase 1).
    location /ws/ {
        proxy_pass http://api:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        # Long-lived connections — disable the upstream idle timeout.
        proxy_read_timeout 3600s;
        proxy_send_timeout 3600s;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }
}
