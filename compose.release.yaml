# Production-style compose file. Pulls pre-built images from GHCR
# instead of building locally — pin a specific version via the
# `AKASHIC_VERSION` environment variable, or default to `latest`.
#
# Usage:
#   AKASHIC_VERSION=v0.1.0 docker compose -f compose.release.yaml up -d
#
# All other services (postgres / meilisearch / redis / tika) are
# inherited from the upstream images they're already pinned to in
# compose.yaml, so this file is the *minimum diff* for using
# pre-built akashic images. Networking, volumes, and healthchecks
# match compose.yaml exactly so you can swap between dev and release
# without losing data.

services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-akashic}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-changeme}
      POSTGRES_DB: ${POSTGRES_DB:-akashic}
    volumes:
      - pgdata:/var/lib/postgresql/data
    ports:
      - "127.0.0.1:5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-akashic}"]
      interval: 5s
      timeout: 5s
      retries: 5

  meilisearch:
    image: getmeili/meilisearch:v1.11
    environment:
      MEILI_MASTER_KEY: ${MEILI_MASTER_KEY:-changeme-meili-key}
    volumes:
      - msdata:/meili_data
    ports:
      - "127.0.0.1:7700:7700"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:7700/health"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    volumes:
      - redisdata:/data
    ports:
      - "127.0.0.1:6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 5

  tika:
    image: apache/tika:3.0.0.0
    ports:
      - "127.0.0.1:9998:9998"

  api:
    image: ghcr.io/metril/akashic-api:${AKASHIC_VERSION:-latest}
    ports:
      - "127.0.0.1:8000:8000"
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
      meilisearch:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    image: ghcr.io/metril/akashic-web:${AKASHIC_VERSION:-latest}
    ports:
      - "3000:3000"
    depends_on:
      - api

  # Bundled scanner agent. v0.3.0+ uses the `auto` entrypoint so
  # the same compose service works on every install state:
  #
  #   - First run, want operator-approved discovery:
  #       AKASHIC_DISCOVER=1 docker compose -f compose.release.yaml \
  #         --profile scanner up -d scanner
  #     → stderr shows a pairing code; approve in Settings → Scanners.
  #
  #   - First run, have a join token (from Settings → Scanners):
  #       AKASHIC_CLAIM_TOKEN=akcl_… docker compose -f compose.release.yaml \
  #         --profile scanner up -d scanner
  #
  #   - Subsequent runs (credentials persisted in the named volume):
  #       docker compose -f compose.release.yaml --profile scanner up -d scanner
  #     → auto detects the saved key+id and runs `agent` directly.
  #
  # Uses a named docker volume (scanner-data) so the container can
  # write its generated keypair on first run without host-uid
  # ceremony. Pre-v0.3.0 installs with files in
  # ./secrets/default-scanner/ — see compose.yaml's migration notes.
  scanner:
    image: ghcr.io/metril/akashic-scanner:${AKASHIC_VERSION:-latest}
    command: [auto]
    environment:
      AKASHIC_API_URL: http://api:8000
      AKASHIC_DISCOVER: ${AKASHIC_DISCOVER:-}
      AKASHIC_CLAIM_TOKEN: ${AKASHIC_CLAIM_TOKEN:-}
      SCANNER_ID: ${SCANNER_ID:-}
    volumes:
      - scanner-data:/secrets
    depends_on:
      - api
    profiles: ["scanner"]

volumes:
  pgdata:
  msdata:
  redisdata:
  scanner-data:
